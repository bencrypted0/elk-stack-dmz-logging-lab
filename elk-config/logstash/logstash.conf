input {
  beats {
    port => 5044
  }
  syslog {
    port => 5140
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" and [program] == "filterlog" {

    # Step 1 - strip syslog header, get CSV payload after "- -"
    grok {
      match => {
        "message" => "<%{INT}>%{INT} %{TIMESTAMP_ISO8601} %{HOSTNAME} filterlog %{INT} - - %{GREEDYDATA:filterlog_data}"
      }
      tag_on_failure => ["_grok_header_failure"]
    }

    # Step 2 - only proceed if header was parsed successfully
    if "_grok_header_failure" not in [tags] {

      # IPv4
      if [filterlog_data] =~ /,4,/ {
        grok {
          match => {
            "filterlog_data" => "%{INT:rule_num},%{DATA:sub_rule},%{DATA:anchor},%{DATA:tracker},%{WORD:interface},%{WORD:reason},%{WORD:action},%{WORD:direction},%{INT:ip_version},%{DATA:tos},%{DATA:ttl},%{INT:ip_id},%{INT:offset},%{DATA:df_bit},%{DATA:flags},%{INT:protocol_id},%{WORD:protocol},%{INT:length},%{IP:src_ip},%{IP:dest_ip},%{INT:src_port},%{INT:dest_port},%{GREEDYDATA:data_length}"
          }
          tag_on_failure => ["_grok_ipv4_failure"]
        }
      }

      # IPv6
      else if [filterlog_data] =~ /,6,/ {
        grok {
          match => {
            "filterlog_data" => "%{INT:rule_num},%{DATA:sub_rule},%{DATA:anchor},%{DATA:tracker},%{WORD:interface},%{WORD:reason},%{WORD:action},%{WORD:direction},%{INT:ip_version},%{DATA:tos},%{DATA:flow_label},%{INT:hop_limit},%{WORD:protocol},%{INT:protocol_id},%{INT:length},%{IP:src_ip},%{IP:dest_ip},%{INT:src_port},%{INT:dest_port},%{GREEDYDATA:remainder}"
          }
          tag_on_failure => ["_grok_ipv6_failure"]
        }
      }

      # Tag action
      if [action] == "block" {
        mutate { add_tag => ["blocked"] }
      }
      else if [action] == "pass" {
        mutate { add_tag => ["passed"] }
      }
    }
  }
}

output {
  if [type] == "syslog" {
    elasticsearch {
      hosts => "http://elasticsearch:9200"
      index => "pfsense-%{+YYYY.MM.dd}"
    }
  }
  else {
    elasticsearch {
      hosts => "http://elasticsearch:9200"
      index => "filebeat-%{+YYYY.MM.dd}"
    }
  }
}